<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-visual">
<title>contestation.ch — Comprendre et contester votre loyer</title>
<meta name="description" content="Vérifiez gratuitement si votre loyer initial peut être contesté à Vaud ou Genève, puis préparez une requête adaptée à votre situation.">
<meta property="og:title" content="Votre nouveau loyer est-il contestable ?">
<meta property="og:description" content="Diagnostic gratuit pour Vaud et Genève. Vérifiez le délai, les motifs et l'autorité compétente.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'Instrument Sans',system-ui,sans-serif;color:#16242A;background:#FBFAF7;-webkit-font-smoothing:antialiased;}
  a{color:#1B4965;text-decoration:none;}
  a:hover{color:#F4A73B;}
  input,button,textarea,select{font-family:inherit;}
  .cc-scroll::-webkit-scrollbar{width:0;background:transparent;}
  details summary{list-style:none;cursor:pointer;}
  details summary::-webkit-details-marker{display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulseDot{0%,100%{opacity:.3;}50%{opacity:1;}}

  /* ===== BASE : site responsive plein écran — aucun mockup téléphone ===== */
  .cc-outer{display:block;min-height:100vh;background:#FBFAF7;}
  .cc-phone{width:100%;min-height:100vh;background:#FBFAF7;display:flex;flex-direction:column;}

  /* ===== MOBILE UX — touch, focus, safe area ===== */
  /* Supprimer le flash gris sur tap */
  button,input,select,textarea{-webkit-tap-highlight-color:transparent;}
  /* Feedback tactile sur les boutons */
  button{touch-action:manipulation;transition:opacity .12s ease,transform .1s ease;}
  button:active{opacity:.8;transform:scale(.985);}
  /* Ring de focus sur les inputs */
  input:focus,textarea:focus{
    outline:none !important;
    border-color:#1B4965 !important;
    box-shadow:0 0 0 3.5px rgba(27,73,101,.14) !important;
  }
  /* Transition sur les inputs (base, pas uniquement :focus, pour animation bidirectionnelle) */
  input,textarea{transition:border-color .15s,box-shadow .15s;}
  /* Momentum scroll iOS + blocage du scrollbar horizontal parasite */
  .cc-scroll{-webkit-overflow-scrolling:touch;overflow-x:hidden;}
  /* Espacement entre texte hero et calculateur sur mobile */
  .cc-hero-right{margin-top:24px;}
  /* Padding sections réduit sur mobile */
  .cc-section-pad{padding-top:48px !important;padding-bottom:48px !important;}
  /* Safe area iPhone X+ pour les barres CTA du bas */
  .cc-cta-bar{padding-bottom:max(16px,env(safe-area-inset-bottom,0px)) !important;}

  /* Classes partagées mobile+desktop */
  .cc-inner{padding-left:22px;padding-right:22px;}
  .cc-hero-row{padding:32px 0 36px;}
  .cc-eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#58717D;margin-bottom:12px;}
  .cc-section-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(27px,3vw,38px);line-height:1.15;color:#12303F;margin:0;letter-spacing:-.015em;}
  .cc-section-intro{font-size:16px;line-height:1.65;color:#5A6A70;max-width:650px;margin:12px 0 32px;}
  .cc-paths,.cc-cases{display:grid;grid-template-columns:1fr;gap:14px;align-items:start;}
  .cc-path{background:#fff;border:1px solid #DDE3E5;border-radius:16px;padding:22px;display:flex;flex-direction:column;box-shadow:0 8px 24px -22px rgba(18,48,63,.45);}
  .cc-path-number{width:30px;height:30px;border:1px solid #CBD8DE;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#1B4965;font-size:12px;font-weight:700;margin-bottom:18px;}
  .cc-path h3{font-size:18px;color:#12303F;margin:0 0 8px;}.cc-path p{font-size:14px;line-height:1.55;color:#5A6A70;margin:0 0 18px;flex:1;}
  .cc-path a,.cc-path button{font-size:14px;font-weight:700;color:#1B4965;background:none;border:0;padding:0;text-align:left;cursor:pointer;}
  .cc-case{background:#fff;border:1px solid #E2E6E7;border-radius:14px;padding:0 20px;transition:border-color .18s ease,box-shadow .18s ease;}.cc-case[open]{border-color:#B8CBD4;box-shadow:0 14px 34px -28px rgba(18,48,63,.55);}.cc-case summary{padding:18px 0;display:flex;justify-content:space-between;align-items:center;gap:16px;font-weight:700;color:#12303F;}.cc-case summary span{transition:transform .18s ease;}.cc-case[open] summary span{transform:rotate(45deg);}.cc-case p{margin:0 0 18px;color:#5A6A70;font-size:14px;line-height:1.6;}.cc-case strong{color:#12303F;}
  .cc-case-kicker{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6C7E85;margin:2px 0 6px;}
  .cc-case-block{padding:14px 0;border-top:1px solid #EEF0F1;}.cc-case-block:first-of-type{padding-top:0;border-top:0;}.cc-case-block p{margin:0;}
  .cc-case-action{margin:2px 0 20px;padding:13px 14px;background:#EEF4F7;border-radius:10px;color:#294D5E;font-size:13px;line-height:1.5;}

  /* ===== DESKTOP ≥ 768 px : vrai site plein écran ===== */
  @media(min-width:768px){
    html,body{height:auto;min-height:100%;}
    body{background:#FBFAF7;}
    .cc-outer{display:block;min-height:100vh;background:none;}
    .cc-phone{width:100%;min-height:100vh;display:flex;flex-direction:column;background:#FBFAF7;}

    /* Nav */
    .cc-nav{position:sticky;top:0;z-index:100;}

    /* Conteneur intérieur centré pour toutes les sections */
    .cc-inner{max-width:1140px;margin:0 auto;padding-left:48px;padding-right:48px;}

    /* ---- HERO : flex row ---- */
    .cc-hero-row{
      display:flex;align-items:center;
      gap:56px;
      padding:72px 0 80px;
    }
    .cc-hero-left{flex:1.2;min-width:0;}
    .cc-hero-left h1{font-size:clamp(40px,4.8vw,66px) !important;line-height:1.03 !important;margin:0 0 20px !important;}
    .cc-hero-left>p{font-size:17px !important;line-height:1.6 !important;max-width:460px;margin:0 0 28px !important;color:#4A5A60;}
    .cc-hero-right{width:410px;flex:none;margin-top:0;}
    .cc-hero-right img{width:115% !important;max-width:none;margin-left:-7.5%;}
    .cc-paths,.cc-cases{grid-template-columns:repeat(3,1fr);}
    .cc-case summary{align-items:flex-start;}
    .cc-nav-links{display:flex !important;}

    /* ---- STEPS : row ---- */
    .cc-steps-list{flex-direction:row !important;gap:24px !important;}
    .cc-steps-list>div{flex:1;}

    /* ---- MOTIFS : row ---- */
    .cc-motifs-list{flex-direction:row !important;gap:20px !important;}
    .cc-motifs-list>div{flex:1;}

    /* ---- STATS : 4 colonnes ---- */
    .cc-stats-grid{grid-template-columns:repeat(4,1fr) !important;}

    /* ---- PRICING : row ---- */
    .cc-pricing-row{flex-direction:row !important;max-width:800px;margin:0 auto !important;}
    .cc-pricing-row>div{flex:1;}

    /* ---- FAQ & CTA : centrés ---- */
    .cc-faq-inner{max-width:720px;margin:0 auto;}
    .cc-cta-wrap{text-align:center;}
    .cc-cta-wrap button{max-width:520px;}

    /* ---- ÉCRANS FORMULAIRE ---- */
    .cc-screen{max-width:720px;margin-left:auto;margin-right:auto;width:100%;}
    /* Sections — padding desktop restauré */
    .cc-section-pad{padding-top:72px !important;padding-bottom:72px !important;}
  }
</style>
</head>
<body>
<div id="app"></div>

<template id="dc-template">
<div class="cc-outer">
  <div class="cc-phone">

    <!-- ===================== OVERLAYS GLOBAUX (busy / erreur) ===================== -->
    <sc-if value="{{ busy }}" hint-placeholder-val="{{ false }}">
      <div style="position:fixed;inset:0;z-index:50;background:rgba(251,250,247,.72);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;">
        <span style="width:42px;height:42px;border:4px solid #EAF1F5;border-top-color:#1B4965;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;"></span>
      </div>
    </sc-if>
    <sc-if value="{{ errorMsg }}" hint-placeholder-val="{{ false }}">
      <div onClick="{{ dismissError }}" style="position:fixed;left:16px;right:16px;top:16px;z-index:60;background:#C43D2E;color:#fff;padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.4;box-shadow:0 8px 24px -8px rgba(196,61,46,.5);cursor:pointer;max-width:680px;margin:0 auto;">
        {{ errorMsg }}<div style="opacity:.75;font-size:11px;margin-top:5px;">Toucher pour fermer</div>
      </div>
    </sc-if>

    <!-- ===================== LANDING ===================== -->
    <sc-if value="{{ isLanding }}" hint-placeholder-val="{{ true }}">
    <div class="cc-scroll cc-landing-screen" data-screen-label="landing" style="flex:1;overflow-y:auto;">
      <div class="cc-nav" style="display:flex;align-items:center;justify-content:space-between;padding:16px max(20px,calc((100vw - 1140px)/2 + 48px));position:sticky;top:0;background:rgba(251,250,247,.94);backdrop-filter:blur(10px);border-bottom:1px solid #E4E7E6;z-index:5;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="position:relative;width:24px;height:24px;border-radius:6px;background:#E1251B;display:inline-flex;align-items:center;justify-content:center;"><span style="position:absolute;width:11px;height:3px;background:#fff;border-radius:1px;"></span><span style="position:absolute;width:3px;height:11px;background:#fff;border-radius:1px;"></span></span>
          <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:17px;color:#12303F;">contestation<span style="color:#F4A73B;">.ch</span></span>
        </div>
        <div style="display:flex;align-items:center;gap:20px;"><div class="cc-nav-links" style="display:none;gap:22px;font-size:14px;font-weight:600;"><a href="#resultat">Ce que vous obtenez</a><a href="#parcours">Solutions</a><a href="#faq">FAQ</a></div><button onClick="{{ goChoix }}" style="background:#1B4965;color:#fff;font-weight:700;font-size:14px;padding:11px 18px;border:none;border-radius:8px;cursor:pointer;">Commencer le diagnostic</button></div>
      </div>

      <div class="cc-landing-body">

        <!-- ===== HERO ===== -->
        <div style="background:linear-gradient(160deg,#EEF4F9 0%,#F5F3EE 55%,#FBFAF7 100%);">
          <div class="cc-inner">
            <div class="cc-hero-row">
              <!-- Texte gauche -->
              <div class="cc-hero-left">
                <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:#EAF1F5;color:#1B4965;font-size:12px;font-weight:600;margin-bottom:20px;">Nouveau bail dans le canton de Vaud ou de Genève</div>
                <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:38px;line-height:1.06;margin:0 0 16px;color:#12303F;letter-spacing:-.02em;">Votre nouveau loyer est peut-être abusif. <span style="color:#178A5B;">Vérifiez-le.</span></h1>
                <p style="margin:0 0 22px;font-size:16px;line-height:1.55;color:#4A5A60;">En quelques clics, nous vérifions si votre loyer peut être contesté. Si c'est le cas, votre lettre personnalisée est préparée automatiquement, prête à envoyer.</p>
                <button onClick="{{ goChoix }}" style="background:#F4A73B;color:#3A2A06;font-weight:800;font-size:17px;padding:16px 24px;border:none;border-radius:13px;box-shadow:0 9px 20px -9px rgba(244,167,59,.9);cursor:pointer;margin-bottom:13px;">Vérifier si mon loyer est contestable →</button>
                <div style="font-size:13px;color:#5A6A70;margin-bottom:17px;">Environ 5 minutes · Diagnostic gratuit · Sans inscription · Lettre dès 5 CHF</div>
                <div style="display:flex;flex-wrap:wrap;gap:10px 16px;">
                  <span style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#5A6A70;"><span style="color:#178A5B;font-weight:700;">✓</span> Aucun paiement avant le diagnostic</span>
                  <span style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#5A6A70;"><span style="color:#178A5B;font-weight:700;">✓</span> Documents supprimés après 7 jours</span>
                </div>
              </div>
              <!-- Mockup de la lettre prête à être envoyée -->
              <div class="cc-hero-right" id="resultat">
                <img src="./assets/hero-lettre-contestation.png" alt="Lettre de contestation préparée et prête à être envoyée" width="1254" height="1254" fetchpriority="high" style="display:block;width:100%;height:auto;">
              </div>
            </div>
          </div>
        </div>

        <!-- ===== TROIS PARCOURS ===== -->
        <section id="parcours">
          <div class="cc-inner cc-section-pad">
            <div class="cc-eyebrow">Choisir la bonne démarche</div>
            <h2 class="cc-section-title">Trois situations, trois parcours distincts</h2>
            <p class="cc-section-intro">Le point de départ n'est pas le même selon que vous venez d'emménager, que vous recevez une hausse ou que le taux de référence a baissé.</p>
            <div class="cc-paths">
              <article class="cc-path"><span class="cc-path-number">01</span><h3>Contester un loyer initial</h3><p>Vous venez de recevoir les clés, le nouveau loyer semble excessif ou la formule officielle manque. Le délai peut être de 30 jours.</p><button onClick="{{ goChoix }}">Vérifier mon loyer initial →</button></article>
              <article class="cc-path"><span class="cc-path-number">02</span><h3>Contester une hausse</h3><p>Votre bailleur vous notifie une augmentation. Vérifiez la forme, les motifs annoncés et le délai avant d'agir.</p><a href="#hausse-guide">Comprendre la marche à suivre →</a></article>
              <article class="cc-path"><span class="cc-path-number">03</span><h3>Demander une baisse</h3><p>Le taux de référence indiqué sur votre bail est supérieur au taux actuel. Estimez d'abord la baisse potentielle.</p><a href="#calcul-baisse">Faire une estimation →</a></article>
            </div>
          </div>
        </section>

        <!-- ===== CALCULATEUR BAISSE : besoin secondaire ===== -->
        <section id="calcul-baisse" style="background:#F4F8FA;border-top:1px solid #E4E7E6;border-bottom:1px solid #E4E7E6;">
          <div class="cc-inner cc-section-pad">
            <div style="display:flex;flex-wrap:wrap;gap:34px 56px;align-items:flex-start;">
              <div style="flex:1;min-width:260px;"><div class="cc-eyebrow">Vous êtes déjà locataire&nbsp;?</div><h2 class="cc-section-title">Estimer une baisse liée au taux de référence</h2><p class="cc-section-intro" style="margin-bottom:0;">Ce calcul est distinct de la contestation du loyer initial. Il estime une éventuelle baisse lorsque le taux indiqué dans votre bail est supérieur au taux actuel.</p></div>
              <div style="width:100%;max-width:440px;background:#fff;border:1px solid #DDE3E5;border-radius:18px;padding:22px;box-shadow:0 14px 36px -28px rgba(18,48,63,.55);">
                <div style="display:flex;gap:10px;margin-bottom:12px;"><div style="flex:1;"><label style="display:block;font-size:12px;font-weight:700;color:#5A6A70;margin-bottom:5px;">Loyer net</label><div style="position:relative;"><input type="text" inputmode="decimal" value="{{ loyer }}" onInput="{{ onLoyer }}" placeholder="1 850" style="width:100%;border:1.5px solid #D8DEE1;border-radius:11px;padding:12px 40px 12px 12px;font-size:16px;color:#12303F;background:#fff;"><span style="position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:12px;color:#8A979C;">CHF</span></div></div><div style="flex:1;"><label style="display:block;font-size:12px;font-weight:700;color:#5A6A70;margin-bottom:5px;">Taux du bail</label><div style="position:relative;"><input type="text" inputmode="decimal" value="{{ taux }}" onInput="{{ onTaux }}" placeholder="1,75" style="width:100%;border:1.5px solid #D8DEE1;border-radius:11px;padding:12px 34px 12px 12px;font-size:16px;color:#12303F;background:#fff;"><span style="position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:12px;color:#8A979C;">%</span></div></div></div>
                <p style="margin:0 0 13px;font-size:11px;color:#8A979C;">Taux actuel&nbsp;: {{ tauxActuel }}&nbsp;%.</p>
                <button onClick="{{ checkCalc }}" style="width:100%;background:#1B4965;color:#fff;font-weight:700;font-size:15px;padding:13px;border:none;border-radius:11px;cursor:pointer;">Faire l'estimation gratuite</button>
                <sc-if value="{{ calcLoading }}" hint-placeholder-val="{{ false }}"><div style="text-align:center;margin-top:12px;color:#5A6A70;font-size:13px;">Calcul en cours…</div></sc-if>
                <sc-if value="{{ calcElig }}" hint-placeholder-val="{{ false }}"><div style="margin-top:13px;background:#E3F3EB;border-radius:12px;padding:14px;color:#0C5638;"><strong>Baisse indicative&nbsp;: −{{ calcPct }} %, soit environ {{ calcChf }} CHF par mois.</strong></div></sc-if>
                <sc-if value="{{ calcNo }}" hint-placeholder-val="{{ false }}"><div style="margin-top:13px;background:#EAF1F5;border-radius:12px;padding:14px;color:#1B4965;font-size:13px;line-height:1.45;">Le taux de référence seul ne fait pas ressortir de baisse.</div></sc-if>
                <sc-if value="{{ calcErr }}" hint-placeholder-val="{{ false }}"><div style="margin-top:12px;font-size:13px;color:#C43D2E;text-align:center;">Renseignez les deux valeurs.</div></sc-if>
              </div>
            </div>
          </div>
        </section>

        <!-- ===== BANDEAU STAT ===== -->
        <div style="background:#12303F;color:#fff;">
          <div class="cc-inner" style="padding-top:52px;padding-bottom:52px;">
            <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(24px,3vw,34px);line-height:1.15;max-width:700px;">Des démarches encadrées, des délais à respecter.</div>
            <p style="margin:14px 0 0;font-size:16px;line-height:1.6;color:#B9C9D1;max-width:680px;">Le droit du bail prévoit des voies différentes selon la situation. Notre rôle est de rendre les premières vérifications compréhensibles et de vous orienter vers l'autorité compétente.</p>
          </div>
        </div>

        <!-- ===== COMMENT ÇA MARCHE ===== -->
        <div>
          <div class="cc-inner cc-section-pad" style="padding-top:72px;padding-bottom:72px;">
            <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(24px,2.5vw,30px);color:#12303F;margin-bottom:36px;">Comment ça marche</div>
            <div class="cc-steps-list" style="display:flex;flex-direction:column;gap:16px;">
              <div style="display:flex;gap:16px;align-items:flex-start;"><span style="flex:none;width:38px;height:38px;border-radius:12px;background:#EAF1F5;color:#1B4965;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;">1</span><div><div style="font-weight:700;color:#12303F;font-size:16px;margin-bottom:4px;">Vous répondez, ou importez votre bail</div><div style="font-size:14px;color:#5A6A70;line-height:1.5;">Quelques questions simples, ou un import automatique. 5 minutes.</div></div></div>
              <div style="display:flex;gap:16px;align-items:flex-start;"><span style="flex:none;width:38px;height:38px;border-radius:12px;background:#EAF1F5;color:#1B4965;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;">2</span><div><div style="font-weight:700;color:#12303F;font-size:16px;margin-bottom:4px;">On prépare votre lettre</div><div style="font-size:14px;color:#5A6A70;line-height:1.5;">Adressée à la bonne autorité, avec les bons motifs juridiques.</div></div></div>
              <div style="display:flex;gap:16px;align-items:flex-start;"><span style="flex:none;width:38px;height:38px;border-radius:12px;background:#EAF1F5;color:#1B4965;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;">3</span><div><div style="font-weight:700;color:#12303F;font-size:16px;margin-bottom:4px;">Vous l'envoyez — ou on l'envoie</div><div style="font-size:14px;color:#5A6A70;line-height:1.5;">Imprimez-la, ou laissez-nous l'expédier en recommandé.</div></div></div>
            </div>
          </div>
        </div>

        <!-- ===== MOTIFS ===== -->
        <div style="background:#F4F8FA;">
          <div class="cc-inner cc-section-pad" style="padding-top:72px;padding-bottom:72px;">
            <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(24px,2.5vw,30px);color:#12303F;margin-bottom:8px;">Pourquoi votre loyer pourrait être contesté</div>
            <p style="margin:0 0 28px;font-size:15px;color:#5A6A70;">Plusieurs éléments peuvent être examinés selon votre dossier.</p>
            <div class="cc-motifs-list" style="display:flex;flex-direction:column;gap:14px;">
              <div style="background:#fff;border:1px solid #E4E2DB;border-radius:16px;padding:20px;"><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:8px;">Formule officielle manquante</div><div style="font-size:14px;color:#5A6A70;line-height:1.5;">Dans les cantons où elle est obligatoire, son absence peut avoir des conséquences importantes sur la fixation du loyer initial.</div></div>
              <div style="background:#fff;border:1px solid #E4E2DB;border-radius:16px;padding:20px;"><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:8px;">Écart avec le loyer précédent</div><div style="font-size:14px;color:#5A6A70;line-height:1.5;">Une augmentation sensible entre deux locataires, notamment sans travaux, peut justifier un examen plus approfondi.</div></div>
              <div style="background:#fff;border:1px solid #E4E2DB;border-radius:16px;padding:20px;"><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:8px;">Rendement excessif</div><div style="font-size:14px;color:#5A6A70;line-height:1.5;">Le rendement obtenu par le bailleur fait partie des critères pouvant être examinés par l'autorité compétente.</div></div>
            </div>

        <section id="cas-concrets" style="background:#fff;">

            <div class="cc-eyebrow">Cas concrets</div>
            <h2 class="cc-section-title">À chaque situation, les bons réflexes</h2>
            <p class="cc-section-intro">Trois exemples simples pour comprendre ce que le service peut vous aider à vérifier.</p>
            <div class="cc-cases">
              <details class="cc-case" open>
                <summary>Vous emménagez et le loyer a bondi <span style="color:#F4A73B;">+</span></summary>
                <div class="cc-case-block"><div class="cc-case-kicker">Imaginez</div><p>Vous venez de recevoir les clés. Votre loyer est de 1'900 CHF alors que la personne avant vous payait 1'650 CHF, et aucun travail important ne semble expliquer l'écart.</p></div>
                <div class="cc-case-block"><div class="cc-case-kicker">Ce que cela peut signifier</div><p>Une hausse entre deux locataires n'est pas automatiquement interdite. Mais un écart sensible, la pression du marché lors de votre recherche ou une formule officielle absente peuvent permettre de demander à l'autorité d'examiner le loyer.</p></div>
                <div class="cc-case-action"><strong>Votre prochain geste :</strong> ne cherchez pas seul le bon argument. Lancez le parcours avec votre bail et votre formule officielle ; le délai ordinaire peut être de 30 jours dès la remise des clés.</div>
              </details>
              <details class="cc-case" id="hausse-guide">
                <summary>Vous recevez une hausse par courrier <span style="color:#F4A73B;">+</span></summary>
                <div class="cc-case-block"><div class="cc-case-kicker">Imaginez</div><p>Votre régie vous annonce que le loyer augmentera de 90 CHF à la prochaine échéance. Elle peut invoquer le taux de référence, le renchérissement, une hausse de certains coûts ou des travaux apportant une plus-value.</p></div>
                <div class="cc-case-block"><div class="cc-case-kicker">Pourquoi la hausse mérite un second regard</div><p>Le montant annoncé n'est pas forcément le montant dû. La hausse peut être fragilisée si elle n'est pas correctement notifiée ou motivée, si le calcul part d'un mauvais taux, ou s'il oublie une baisse de coûts à laquelle vous auriez droit. Par exemple, une diminution du taux de référence peut devoir corriger une partie de l'augmentation.</p></div>
                <div class="cc-case-action"><strong>Votre prochain geste :</strong> conservez l'enveloppe et la notification. Faites contrôler le calcul rapidement : une hausse se conteste en principe devant l'autorité de conciliation dans les 30 jours suivant sa réception.</div>
              </details>
              <details class="cc-case">
                <summary>Votre loyer n'a jamais suivi la baisse des taux <span style="color:#F4A73B;">+</span></summary>
                <div class="cc-case-block"><div class="cc-case-kicker">Imaginez</div><p>Votre bail mentionne un taux de référence supérieur au taux actuel, mais votre loyer n'a jamais diminué. Vous vous demandez si la baisse aurait dû être automatique.</p></div>
                <div class="cc-case-block"><div class="cc-case-kicker">Ce que cela peut signifier</div><p>La baisse n'est généralement pas appliquée spontanément : c'est au locataire de la demander. Le bailleur peut toutefois opposer d'autres facteurs de coûts, qui doivent être expliqués et intégrés au calcul.</p></div>
                <div class="cc-case-action"><strong>Votre prochain geste :</strong> comparez le taux déterminant de votre loyer au taux actuel avec notre estimation, puis adressez une demande écrite si une baisse ressort.</div>
              </details>
            </div>
            <p style="font-size:12px;color:#7B898E;margin:18px 0 0;line-height:1.55;">Exemples illustratifs : le résultat dépend toujours des pièces, des dates et des autres facteurs de coûts. Règles générales vérifiées auprès de l'<a href="https://www.bwo.admin.ch/fr/taux-de-reference" target="_blank" rel="noopener" style="text-decoration:underline;">Office fédéral du logement</a> et du <a href="https://www.fedlex.admin.ch/eli/cc/27/317_321_377/fr" target="_blank" rel="noopener" style="text-decoration:underline;">Code des obligations</a>.</p>

              <details style="border-bottom:1px solid #EEEBE3;padding:16px 0;"><summary style="font-weight:600;color:#12303F;font-size:15px;display:flex;justify-content:space-between;gap:12px;">Est-ce vraiment légal&nbsp;?<span style="color:#F4A73B;flex:none;">+</span></summary><p style="margin:12px 0 0;font-size:14px;color:#5A6A70;line-height:1.6;">Oui. Contester un loyer est un droit prévu par le Code des obligations. La procédure de conciliation est gratuite et confidentielle.</p></details>
              <details style="border-bottom:1px solid #EEEBE3;padding:16px 0;"><summary style="font-weight:600;color:#12303F;font-size:15px;display:flex;justify-content:space-between;gap:12px;">Mon bailleur peut-il se venger&nbsp;?<span style="color:#F4A73B;flex:none;">+</span></summary><p style="margin:12px 0 0;font-size:14px;color:#5A6A70;line-height:1.6;">La loi protège contre les résiliations de représailles pendant et après une contestation.</p></details>
              <details style="border-bottom:1px solid #EEEBE3;padding:16px 0;"><summary style="font-weight:600;color:#12303F;font-size:15px;display:flex;justify-content:space-between;gap:12px;">Et mes données&nbsp;?<span style="color:#F4A73B;flex:none;">+</span></summary><p style="margin:12px 0 0;font-size:14px;color:#5A6A70;line-height:1.6;">Elles servent uniquement à analyser votre situation et produire votre lettre. Les documents importés peuvent être traités par un prestataire automatisé externe et sont supprimés selon la durée indiquée dans notre politique de confidentialité.</p></details>
              <details style="border-bottom:1px solid #EEEBE3;padding:16px 0;"><summary style="font-weight:600;color:#12303F;font-size:15px;display:flex;justify-content:space-between;gap:12px;">Est-ce que je paie si mon dossier n'est pas recevable&nbsp;?<span style="color:#F4A73B;flex:none;">+</span></summary><p style="margin:12px 0 0;font-size:14px;color:#5A6A70;line-height:1.6;">Non. Le diagnostic est gratuit. Une offre payante n'est proposée qu'après l'analyse, si une lettre peut être préparée.</p></details>
              <details style="border-bottom:1px solid #EEEBE3;padding:16px 0;"><summary style="font-weight:600;color:#12303F;font-size:15px;display:flex;justify-content:space-between;gap:12px;">Et si le délai de 30 jours est dépassé&nbsp;?<span style="color:#F4A73B;flex:none;">+</span></summary><p style="margin:12px 0 0;font-size:14px;color:#5A6A70;line-height:1.6;">Le diagnostic vous l'indique et aucune lettre de contestation initiale ne vous est vendue. L'absence éventuelle de formule officielle doit toutefois être vérifiée séparément, car elle peut modifier l'analyse.</p></details>
              <details style="border-bottom:1px solid #EEEBE3;padding:16px 0;"><summary style="font-weight:600;color:#12303F;font-size:15px;display:flex;justify-content:space-between;gap:12px;">Puis-je commencer sans formule officielle&nbsp;?<span style="color:#F4A73B;flex:none;">+</span></summary><p style="margin:12px 0 0;font-size:14px;color:#5A6A70;line-height:1.6;">Oui. Le parcours vous aide à vérifier si vous l'avez reçue. Ne plus la retrouver et ne l'avoir jamais reçue sont deux situations juridiquement différentes.</p></details>
              <details style="border-bottom:1px solid #EEEBE3;padding:16px 0;"><summary style="font-weight:600;color:#12303F;font-size:15px;display:flex;justify-content:space-between;gap:12px;">Quelle différence entre contester et demander une baisse&nbsp;?<span style="color:#F4A73B;flex:none;">+</span></summary><p style="margin:12px 0 0;font-size:14px;color:#5A6A70;line-height:1.6;">Une contestation vise un loyer initial ou une hausse notifiée et implique généralement un délai pour saisir l'autorité. Une demande de baisse part d'un changement des bases de calcul, par exemple le taux de référence, et commence auprès du bailleur.</p></details>

        <sc-if value="{{ an0 }}" hint-placeholder-val="{{ false }}"><div style="display:flex;align-items:center;gap:12px;animation:fadeUp .3s ease;"><span style="width:24px;height:24px;border-radius:50%;background:#E3F3EB;color:#178A5B;display:flex;align-items:center;justify-content:center;font-size:13px;">✓</span><span style="font-size:14px;color:#12303F;">Adresse et parties identifiées</span></div></sc-if>
        <sc-if value="{{ an1 }}" hint-placeholder-val="{{ false }}"><div style="display:flex;align-items:center;gap:12px;animation:fadeUp .3s ease;"><span style="width:24px;height:24px;border-radius:50%;background:#E3F3EB;color:#178A5B;display:flex;align-items:center;justify-content:center;font-size:13px;">✓</span><span style="font-size:14px;color:#12303F;">Loyer et charges extraits</span></div></sc-if>
        <sc-if value="{{ an2 }}" hint-placeholder-val="{{ false }}"><div style="display:flex;align-items:center;gap:12px;animation:fadeUp .3s ease;"><span style="width:24px;height:24px;border-radius:50%;background:#E3F3EB;color:#178A5B;display:flex;align-items:center;justify-content:center;font-size:13px;">✓</span><span style="font-size:14px;color:#12303F;">Vérification de la formule officielle</span></div></sc-if>
      </div>
    </div>
    </sc-if>

    <sc-if value="{{ importValidation }}" hint-placeholder-val="{{ false }}">

      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #EEEBE3;">
        <button onClick="{{ goChoix }}" style="width:36px;height:36px;border-radius:10px;border:1px solid #E4E2DB;background:#fff;color:#12303F;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;">←</button>
        <span style="font-weight:700;color:#12303F;font-size:16px;">Vérifiez les informations</span>
      </div>
      <div style="padding:22px 22px 20px;flex:1;">
        <div style="background:#E3F3EB;border-radius:14px;padding:14px 16px;font-size:14px;color:#0C5638;line-height:1.45;margin-bottom:20px;">✓ Lecture terminée. Vérifiez les champs ci-dessous — surtout ceux marqués <strong>à vérifier</strong> — puis lancez le diagnostic.</div>
        <sc-if value="{{ extractionHasUncertain }}" hint-placeholder-val="false"><div style="background:#FFF3DF;border:1px solid #F0C77A;border-radius:12px;padding:12px 14px;font-size:13px;color:#7A5406;line-height:1.45;margin-bottom:18px;"><strong>Champs signalés comme incertains par l'analyse&nbsp;:</strong> {{ extractionUncertainText }}</div></sc-if>

        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;color:#8A979C;text-transform:uppercase;margin-bottom:12px;">Le logement</div>

          <div style="width:120px;"><label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Canton</label><select value="{{ d.canton }}" onChange="{{ onCanton }}" style="width:100%;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;"><option value="">—</option><option value="VD">VD</option><option value="GE">GE</option></select></div>
          <div style="flex:1;"><label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">NPA</label><input type="text" inputmode="numeric" value="{{ d.npa }}" onChange="{{ onNpa }}" style="width:100%;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;"></div>
        </div>
        <label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Commune</label>
        <input type="text" autocomplete="address-level2" value="{{ d.commune }}" onChange="{{ onCommune }}" style="width:100%;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;margin-bottom:12px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Adresse</label>
        <input type="text" autocomplete="street-address" value="{{ d.adresse }}" onChange="{{ onAdresseSimple }}" style="width:100%;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;margin-bottom:12px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Date de remise des clés <span style="background:#FFF3DF;color:#7A5406;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;">À VÉRIFIER</span></label>
        <input type="date" value="{{ d.dateCles }}" onChange="{{ onDateCles }}" style="width:100%;box-sizing:border-box;border:1.5px solid #F0C77A;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#FFFDF8;margin-bottom:18px;">

        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;color:#8A979C;text-transform:uppercase;margin-bottom:12px;">Les montants</div>
        <div style="display:flex;gap:10px;margin-bottom:12px;">
          <div style="flex:1;"><label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Loyer net</label><input type="text" value="{{ d.loyerNet }}" onChange="{{ onLoyerNet }}" style="width:100%;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;"></div>
          <div style="flex:1;"><label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Charges</label><input type="text" value="{{ d.charges }}" onChange="{{ onCharges }}" style="width:100%;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;"></div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Loyer de l'ancien locataire <span style="background:#FFF3DF;color:#7A5406;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;">À VÉRIFIER</span></label>
        <input type="text" value="{{ d.loyerPrec }}" onChange="{{ onLoyerPrec }}" style="width:100%;box-sizing:border-box;border:1.5px solid #F0C77A;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#FFFDF8;margin-bottom:18px;">

        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;color:#8A979C;text-transform:uppercase;margin-bottom:12px;">Les parties</div>
        <label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Locataire</label>
        <div style="display:flex;gap:10px;margin-bottom:12px;"><input type="text" value="{{ d.locPrenom }}" onChange="{{ onLocPrenom }}" placeholder="Prénom" style="flex:1;min-width:0;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;"><input type="text" value="{{ d.locNom }}" onChange="{{ onLocNom }}" placeholder="Nom" style="flex:1;min-width:0;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;"></div>
        <label style="display:block;font-size:13px;font-weight:600;color:#5A6A70;margin-bottom:6px;">Régie ou propriétaire</label>
        <input type="text" value="{{ d.regNom }}" onChange="{{ onRegNom }}" style="width:100%;box-sizing:border-box;border:1.5px solid #D8DEE1;border-radius:12px;padding:13px;font-size:16px;color:#12303F;background:#fff;margin-bottom:18px;">

        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;color:#8A979C;text-transform:uppercase;margin-bottom:12px;">Le point clé</div>
        <div style="background:#F4F8FA;border:1px solid #CBDCE4;border-radius:14px;padding:16px;margin-bottom:20px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-weight:700;color:#12303F;font-size:15px;">Formule officielle</span><sc-if value="{{ importFormuleOui }}" hint-placeholder-val="false"><span style="background:#178A5B;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;">DOCUMENT IDENTIFIÉ</span></sc-if><sc-if value="{{ importFormuleNon }}" hint-placeholder-val="false"><span style="background:#C43D2E;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;">NON REÇUE</span></sc-if><sc-if value="{{ importFormuleInconnue }}" hint-placeholder-val="true"><span style="background:#F4A73B;color:#5C430D;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;">À CONFIRMER</span></sc-if></div>
          <p style="margin:0 0 12px;font-size:13px;color:#3E5560;line-height:1.45;">L'absence d'un fichier séparé ne prouve pas que la formule ne vous a jamais été remise. Confirmez votre situation après avoir vérifié le bail, ses annexes et vos e-mails.</p>
          <div style="display:flex;flex-wrap:wrap;gap:7px;"><button onClick="{{ setImportFormuleOui }}" style="background:#fff;border:1px solid #9CB6C2;border-radius:9px;padding:9px 11px;color:#1B4965;font-size:12px;font-weight:700;cursor:pointer;">Je l'ai reçue</button><button onClick="{{ setImportFormuleNon }}" style="background:#fff;border:1px solid #9CB6C2;border-radius:9px;padding:9px 11px;color:#1B4965;font-size:12px;font-weight:700;cursor:pointer;">Je ne l'ai jamais reçue</button><button onClick="{{ setImportFormuleInconnue }}" style="background:#fff;border:1px solid #9CB6C2;border-radius:9px;padding:9px 11px;color:#1B4965;font-size:12px;font-weight:700;cursor:pointer;">Je ne sais pas</button></div>
        </div>
      </div>
      <div class="cc-cta-bar" style="padding:16px 22px;border-top:1px solid #EEEBE3;background:#FBFAF7;">
        <button onClick="{{ goDiagnostic }}" style="width:100%;background:#F4A73B;color:#3A2A06;font-weight:700;font-size:17px;padding:16px;border:none;border-radius:14px;box-shadow:0 8px 18px -8px rgba(244,167,59,.9);cursor:pointer;">Voir mon diagnostic →</button>
      </div>
    </div>
    </sc-if>

    <!-- ===================== DIAGNOSTIC ===================== -->
    <sc-if value="{{ isDiagnostic }}" hint-placeholder-val="{{ false }}">
    <div class="cc-scroll cc-screen" data-screen-label="diagnostic" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #EEEBE3;position:sticky;top:0;background:rgba(251,250,247,.92);backdrop-filter:blur(8px);z-index:5;">
        <button onClick="{{ goChoix }}" style="width:36px;height:36px;border-radius:10px;border:1px solid #E4E2DB;background:#fff;color:#12303F;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;">←</button>
        <span style="font-weight:700;color:#12303F;font-size:16px;">Votre diagnostic</span>
      </div>

      <div style="padding:24px 22px 20px;">
        <sc-if value="{{ diagEligible }}" hint-placeholder-val="{{ true }}">
          <div style="background:linear-gradient(150deg,#178A5B,#0C5638);border-radius:22px;padding:26px 22px;color:#fff;animation:fadeUp .4s ease;">
            <div style="width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px;">✓</div>
            <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:27px;line-height:1.1;margin-bottom:8px;">Votre dossier paraît solide.</div>
            <p style="margin:0;font-size:15px;line-height:1.5;color:#CDEBDC;">Nous avons identifié <strong style="color:#fff;">{{ diagMotifsText }}</strong>. Au vu des informations fournies, il vaut la peine de contester votre loyer initial auprès de l'autorité de conciliation.</p>
          </div>
        </sc-if>
        <sc-if value="{{ diagHorsDelai }}" hint-placeholder-val="{{ false }}">
          <div style="background:#FFF3DF;border:1px solid #F0C77A;border-radius:22px;padding:24px 22px;animation:fadeUp .4s ease;">
            <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;color:#7A5406;line-height:1.15;margin-bottom:8px;">Le délai de 30 jours semble dépassé</div>
            <p style="margin:0 0 4px;font-size:15px;line-height:1.5;color:#7A5406;">Contester le loyer initial n'est probablement plus recevable. Mais tout n'est pas perdu&nbsp;: vous pourriez avoir droit à une baisse fondée sur le taux de référence.</p>
          </div>
        </sc-if>
        <sc-if value="{{ diagManuel }}" hint-placeholder-val="{{ false }}">
          <div style="background:#EAF1F5;border:1px solid #CBDCE4;border-radius:22px;padding:24px 22px;animation:fadeUp .4s ease;">
            <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;color:#1B4965;line-height:1.15;margin-bottom:8px;">On étudie votre cas à la main</div>
            <p style="margin:0;font-size:15px;line-height:1.5;color:#3E5560;">Votre situation demande une vérification humaine. Laissez-nous votre e-mail, on revient vers vous rapidement.</p>
          </div>
        </sc-if>
      </div>

      <div style="padding:6px 22px 8px;">
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:#12303F;margin-bottom:6px;">Vos motifs de contestation</div>
        <p style="margin:0 0 16px;font-size:14px;color:#5A6A70;">Les éléments juridiques et factuels qui seront développés dans votre requête.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <sc-for list="{{ motifs }}" as="m" hint-placeholder-count="3">
            <div style="background:#fff;border:1px solid #E4E2DB;border-radius:16px;padding:16px;border-left:4px solid #178A5B;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;">
                <span style="font-weight:700;color:#12303F;font-size:15px;line-height:1.3;">{{ m.libelle }}</span>
              </div>
              <div style="background:#F4F8FA;border-radius:11px;padding:12px 13px;margin-top:10px;">
                <div style="font-size:12px;font-weight:800;color:#178A5B;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;">Pourquoi ce motif&nbsp;?</div>
                <div style="font-size:14px;color:#3E5560;line-height:1.55;">{{ m.explicationSimple }}</div>
              </div>
            </div>
          </sc-for>
        </div>
      </div>

      <sc-if value="{{ autPresent }}" hint-placeholder-val="{{ true }}">
      <div style="padding:22px;">
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:#12303F;margin-bottom:12px;">À qui la demande sera adressée</div>
        <div style="background:#F4F8FA;border:1px solid #E4E2DB;border-radius:16px;padding:18px;">
          <div style="font-size:11px;font-weight:700;letter-spacing:.06em;color:#1B4965;text-transform:uppercase;margin-bottom:8px;">{{ autType }}</div>
          <div style="font-size:15px;color:#12303F;font-weight:600;line-height:1.5;">{{ autNom }}</div>
          <div style="font-size:14px;color:#5A6A70;line-height:1.5;margin-top:4px;">{{ autAdresse }}<br>{{ autCase }}<br>{{ autVille }}</div>
        </div>
      </div>
      </sc-if>

      <sc-if value="{{ formuleAClarifier }}" hint-placeholder-val="false">
      <div style="padding:0 22px 12px;">
        <div style="background:#FFF8E9;border:1px solid #F0C77A;border-radius:16px;padding:17px;color:#5C430D;">
          <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;">
            <span style="font-size:18px;line-height:1;">⚠️</span>
            <div><div style="font-weight:800;font-size:15px;color:#6B4905;margin-bottom:3px;">Vérifiez si vous avez reçu la formule officielle</div><div style="font-size:13.5px;line-height:1.45;">Votre réponse peut changer le motif invoqué et le délai applicable. Ne laissez donc pas ce point sans réponse.</div></div>
          </div>
          <div style="background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;font-size:13px;line-height:1.5;">
            <strong>1. Où chercher&nbsp;?</strong><br>
            Regardez avec votre bail et ses annexes, dans l'e-mail de signature électronique et dans les documents reçus lors de la remise des clés. Le document porte généralement un titre comme «&nbsp;Notification de loyer lors de la conclusion d'un nouveau bail&nbsp;» et indique l'ancien loyer, le nouveau loyer ainsi que le délai de contestation.
          </div>
          <div style="background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;font-size:13px;line-height:1.5;">
            <strong>2. Si vous la retrouvez</strong><br>
            Conservez-la et joignez-en une copie à votre requête. Cliquez ensuite sur «&nbsp;Je l'ai retrouvée&nbsp;» pour recalculer le diagnostic.
          </div>
          <div style="background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;font-size:13px;line-height:1.5;">
            <strong>3. Si vous ne la trouvez pas</strong><br>
            <strong>Pourquoi est-ce important&nbsp;?</strong> Lorsqu'elle était obligatoire mais ne vous a pas été remise, la fixation du loyer initial peut être déclarée nulle. L'autorité peut alors fixer elle-même un loyer non abusif et, selon le résultat, ordonner le remboursement des montants payés en trop.<br><br>
            Ne plus avoir le document dans vos papiers ne prouve toutefois pas qu'il ne vous a jamais été remis. Le bailleur peut apporter une preuve de remise&nbsp;; dans ce cas, les règles ordinaires, notamment le délai de contestation, peuvent s'appliquer. Demandez donc une copie par écrit à votre régie ou à votre propriétaire et conservez leur réponse ainsi que votre demande.
          </div>
          <div style="background:#FBEAE7;border-radius:12px;padding:12px 13px;margin-bottom:12px;font-size:13px;line-height:1.5;color:#7A2A20;">
            <strong>N'attendez pas leur réponse si un délai est en cours.</strong> Demander une copie à la régie ne suspend pas le délai de contestation. En cas de doute ou si les 30 jours approchent, contactez rapidement l'autorité de conciliation ou une association de locataires.
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            <button onClick="{{ formuleRetrouvee }}" style="flex:1;min-width:180px;background:#1B4965;color:#fff;border:none;border-radius:11px;padding:12px 14px;font-size:13px;font-weight:700;cursor:pointer;">Je l'ai retrouvée</button>
            <button onClick="{{ formuleNonRecue }}" style="flex:1;min-width:220px;background:#fff;color:#6B4905;border:1px solid #D8B765;border-radius:11px;padding:12px 14px;font-size:13px;font-weight:700;cursor:pointer;">Après vérification, je ne l'ai pas reçue</button>
          </div>
        </div>
      </div>
      </sc-if>

      <sc-if value="{{ hasAvert }}" hint-placeholder-val="{{ false }}">
      <div style="padding:0 22px 8px;">
        <div style="display:flex;flex-direction:column;gap:10px;">
          <sc-for list="{{ avertissements }}" as="a" hint-placeholder-count="1">
            <div style="background:#FFF3DF;border-radius:12px;padding:13px 15px;font-size:13px;color:#7A5406;line-height:1.45;display:flex;gap:10px;"><span>⚠️</span><span>{{ a }}</span></div>
          </sc-for>
        </div>
      </div>
      </sc-if>

      <sc-if value="{{ diagEligible }}" hint-placeholder-val="{{ true }}">
      <div style="padding:18px 22px 8px;">
        <details style="background:#fff;border:1px solid #E4E2DB;border-radius:16px;padding:16px;">
          <summary style="font-weight:700;color:#12303F;font-size:15px;display:flex;justify-content:space-between;">Ce que la lettre demandera<span style="color:#F4A73B;">+</span></summary>
          <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">

        <sc-if value="{{ is35 }}" hint-placeholder-val="{{ false }}"><p style="margin:0;font-size:15px;color:#5A6A70;line-height:1.5;">On s'occupe de tout. Votre lettre signée part en recommandé sous 1 à 2 jours ouvrés. Vous suivrez son envoi ici.</p></sc-if>
      </div>
      <div style="padding:0 22px 20px;">
        <div style="background:#12303F;border-radius:18px;padding:22px;color:#fff;">
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;margin-bottom:6px;">Créez votre compte</div>
          <p style="margin:0 0 16px;font-size:13.5px;color:#B9C9D1;line-height:1.45;">Pour suivre votre dossier et retrouver votre lettre à tout moment.</p>
          <input type="email" placeholder="Votre e-mail" value="{{ d.locEmail }}" style="width:100%;box-sizing:border-box;border:none;border-radius:12px;padding:14px;font-size:16px;color:#12303F;background:#fff;margin-bottom:10px;">
          <input type="password" placeholder="Créez un mot de passe" style="width:100%;box-sizing:border-box;border:none;border-radius:12px;padding:14px;font-size:16px;color:#12303F;background:#fff;margin-bottom:14px;">
          <button onClick="{{ goDashboard }}" style="width:100%;background:#F4A73B;color:#3A2A06;font-weight:700;font-size:16px;padding:15px;border:none;border-radius:12px;cursor:pointer;">Créer mon compte et suivre →</button>
        </div>
        <button onClick="{{ goDashboard }}" style="width:100%;background:transparent;color:#5A6A70;font-weight:600;font-size:14px;padding:16px;border:none;cursor:pointer;margin-top:6px;">Plus tard, voir mon dossier</button>
      </div>
    </div>
    </sc-if>

    <!-- ===================== DASHBOARD SUIVI ===================== -->
    <sc-if value="{{ isDashboard }}" hint-placeholder-val="{{ false }}">
    <div class="cc-scroll cc-screen" data-screen-label="dashboard" style="flex:1;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #EEEBE3;">
        <div style="display:flex;align-items:center;gap:8px;"><span style="position:relative;width:24px;height:24px;border-radius:6px;background:#E1251B;display:inline-flex;align-items:center;justify-content:center;"><span style="position:absolute;width:11px;height:3px;background:#fff;border-radius:1px;"></span><span style="position:absolute;width:3px;height:11px;background:#fff;border-radius:1px;"></span></span><span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;color:#12303F;">Mon dossier</span></div>
        <button onClick="{{ goLanding }}" style="background:transparent;border:none;color:#8A979C;font-size:13px;cursor:pointer;">Déconnexion</button>
      </div>
      <div style="padding:24px 22px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;color:#12303F;">Contestation loyer initial</span></div>
        <div style="font-size:14px;color:#5A6A70;margin-bottom:20px;">{{ letterAdr }} · {{ letterVille }}</div>

        <div style="background:#E3F3EB;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:24px;"><span style="width:10px;height:10px;border-radius:50%;background:#178A5B;"></span><span style="font-size:14px;font-weight:600;color:#0C5638;">Dossier actif</span></div>

        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;color:#8A979C;text-transform:uppercase;margin-bottom:14px;">Suivi</div>
        <div style="display:flex;flex-direction:column;">
          <div style="display:flex;gap:14px;padding-bottom:20px;border-left:2px solid #178A5B;margin-left:9px;padding-left:22px;position:relative;"><span style="position:absolute;left:-9px;top:0;width:16px;height:16px;border-radius:50%;background:#178A5B;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;">✓</span><div><div style="font-weight:700;color:#12303F;font-size:15px;">Paiement confirmé</div><div style="font-size:13px;color:#8A979C;">Aujourd'hui</div></div></div>
          <div style="display:flex;gap:14px;padding-bottom:20px;border-left:2px solid #178A5B;margin-left:9px;padding-left:22px;position:relative;"><span style="position:absolute;left:-9px;top:0;width:16px;height:16px;border-radius:50%;background:#178A5B;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;">✓</span><div><div style="font-weight:700;color:#12303F;font-size:15px;">Lettre générée</div><div style="font-size:13px;color:#8A979C;">Personnalisée et prête</div></div></div>
          <sc-if value="{{ is35 }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex;gap:14px;padding-bottom:20px;border-left:2px solid #E4E2DB;margin-left:9px;padding-left:22px;position:relative;"><span style="position:absolute;left:-9px;top:0;width:16px;height:16px;border-radius:50%;background:#F4A73B;"></span><div><div style="font-weight:700;color:#12303F;font-size:15px;">Envoi en recommandé</div><div style="font-size:13px;color:#8A979C;">En préparation · sous 1-2 jours</div></div></div>
            <div style="display:flex;gap:14px;margin-left:9px;padding-left:22px;position:relative;"><span style="position:absolute;left:-9px;top:0;width:16px;height:16px;border-radius:50%;background:#E4E2DB;"></span><div><div style="font-weight:700;color:#8A979C;font-size:15px;">Remis à la conciliation</div><div style="font-size:13px;color:#8A979C;">À venir</div></div></div>
          </sc-if>
          <sc-if value="{{ is5 }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex;gap:14px;margin-left:9px;padding-left:22px;position:relative;"><span style="position:absolute;left:-9px;top:0;width:16px;height:16px;border-radius:50%;background:#E4E2DB;"></span><div><div style="font-weight:700;color:#8A979C;font-size:15px;">À vous d'envoyer</div><div style="font-size:13px;color:#8A979C;">Imprimez et postez la lettre</div></div></div>
          </sc-if>
        </div>

        <sc-if value="{{ is35 }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top:22px;background:#F4F8FA;border:1px solid #E4E2DB;border-radius:16px;padding:18px;">
            <div style="font-size:13px;color:#5A6A70;margin-bottom:4px;">Numéro de suivi recommandé</div>
            <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;color:#12303F;letter-spacing:.02em;">{{ trackNum }}</div>
            <div style="font-size:12px;color:#8A979C;margin-top:6px;">Disponible dès le dépôt à la poste.</div>
          </div>
        </sc-if>

        <div style="margin-top:22px;">
          <button onClick="{{ downloadLetter }}" style="width:100%;background:#1B4965;color:#fff;font-weight:700;font-size:16px;padding:15px;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;">⬇ Télécharger ma lettre (PDF)</button>
        </div>
        <p style="margin:18px 0 0;font-size:12px;color:#8A979C;line-height:1.5;text-align:center;">Vos données seront supprimées automatiquement 7 jours après la clôture du dossier.</p>
      </div>
    </div>
    </sc-if>

    <!-- ===================== CGV ===================== -->
    <sc-if value="{{ isCgv }}" hint-placeholder-val="{{ false }}">
    <div class="cc-scroll cc-screen" data-screen-label="cgv" style="flex:1;overflow-y:auto;">
      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #EEEBE3;position:sticky;top:0;background:rgba(251,250,247,.94);backdrop-filter:blur(8px);z-index:5;">
        <button onClick="{{ goLanding }}" style="width:36px;height:36px;border-radius:10px;border:1px solid #E4E2DB;background:#fff;color:#12303F;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;">←</button>
        <span style="font-weight:700;color:#12303F;font-size:16px;">Conditions générales</span>
      </div>
      <div style="padding:26px 22px;">
        <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;color:#12303F;margin:0 0 6px;">Conditions générales de vente</h1>
        <p style="margin:0 0 24px;font-size:13px;color:#8A979C;">Dernière mise à jour&nbsp;: {{ lieuDate }}</p>
        <div style="background:#FBEAE7;border:1px solid #F1B8AE;border-radius:14px;padding:16px;margin-bottom:24px;"><div style="font-weight:700;color:#12303F;font-size:14px;margin-bottom:4px;">Nature du service</div><p style="margin:0;font-size:13.5px;color:#7A2A20;line-height:1.5;">contestation.ch est un outil d'aide à la rédaction de courriers. Ce n'est <strong>ni un cabinet d'avocats, ni un conseil juridique</strong>. Aucune garantie de résultat n'est donnée.</p></div>
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">1. Objet</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Le service génère une lettre de contestation de loyer initial personnalisée, à partir des informations que vous fournissez, pour les cantons de Vaud et Genève.</p></div>
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">2. Prix et prestations</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Formule à 5 CHF&nbsp;: lettre au format PDF à imprimer et envoyer soi-même. Formule à 35 CHF&nbsp;: impression et envoi en recommandé par nos soins, expéditeur étant le locataire.</p></div>
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">3. Responsabilité</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Vous restez seul responsable du suivi de votre démarche&nbsp;: respect des délais, réception par l'autorité, suites de la procédure. Pour tout cas complexe, adressez-vous à l'<strong>ASLOCA</strong>.</p></div>
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">4. Rétractation et remboursement</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">La lettre étant générée sur mesure, le droit de rétractation ne s'applique pas une fois le document débloqué. En cas d'échec de génération, vous êtes intégralement remboursé.</p></div>
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">5. Données</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Vos données et documents sont traités uniquement pour fournir le service et supprimés automatiquement 7 jours après la clôture du dossier. Voir la politique de confidentialité pour les prestataires utilisés.</p></div>
        </div>
      </div>
    </div>
    </sc-if>

    <!-- ===================== CONFIDENTIALITÉ ===================== -->
    <sc-if value="{{ isPrivacy }}" hint-placeholder-val="{{ false }}">
    <div class="cc-scroll cc-screen" data-screen-label="confidentialite" style="flex:1;overflow-y:auto;">
      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #EEEBE3;position:sticky;top:0;background:rgba(251,250,247,.94);backdrop-filter:blur(8px);z-index:5;">
        <button onClick="{{ goLanding }}" style="width:36px;height:36px;border-radius:10px;border:1px solid #E4E2DB;background:#fff;color:#12303F;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;">←</button>
        <span style="font-weight:700;color:#12303F;font-size:16px;">Confidentialité</span>
      </div>
      <div style="padding:26px 22px;">
        <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;color:#12303F;margin:0 0 20px;">Politique de confidentialité</h1>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
          <div style="background:#EAF1F5;border-radius:14px;padding:16px;"><div style="font-size:22px;margin-bottom:6px;">🔒</div><div style="font-weight:700;color:#1B4965;font-size:14px;">Traitement limité</div><div style="font-size:12.5px;color:#3E5560;line-height:1.4;margin-top:4px;">Les documents servent uniquement à l'analyse et à la génération demandées.</div></div>
          <div style="background:#E3F3EB;border-radius:14px;padding:16px;"><div style="font-size:22px;margin-bottom:6px;">🗑️</div><div style="font-weight:700;color:#0C5638;font-size:14px;">Effacé à J+7</div><div style="font-size:12.5px;color:#4C7C64;line-height:1.4;margin-top:4px;">Suppression automatique 7 jours après clôture.</div></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">Données collectées</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Les informations de votre dossier (loyer, adresse, coordonnées) et, le cas échéant, votre bail et la formule officielle. Elles servent uniquement à générer et acheminer votre lettre.</p></div>
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">Sous-traitants</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Paiement via Stripe, envoi recommandé via Pingen, extraction via un modèle d'IA en mode <strong>sans rétention</strong>. Chacun est encadré par un accord de traitement des données.</p></div>
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">Conservation</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Toutes vos données — base de données et documents — sont purgées automatiquement 7 jours après la clôture du dossier.</p></div>
          <div><div style="font-weight:700;color:#12303F;font-size:15px;margin-bottom:6px;">Cas complexes</div><p style="margin:0;font-size:14px;color:#5A6A70;line-height:1.55;">Pour un accompagnement juridique complet, nous vous renvoyons vers l'<strong>ASLOCA</strong>, association suisse des locataires.</p></div>
        </div>
      </div>
    </div>
    </sc-if>

  </div>
</div>
</template>

<script src="./config.js"></script>
<script src="./api.js"></script>
<script src="./support.js"></script>
<script src="./app.js"></script>
</body>
</html>
