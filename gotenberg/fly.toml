app = "contestation-gotenberg"
primary_region = "cdg"  # Paris — le plus proche de la Suisse

[build]
  image = "gotenberg/gotenberg:8"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
